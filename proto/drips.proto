syntax = "proto3";
package drips;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

option go_package = "github.com/mathyourlife/drips/proto";

service DripsService {
    rpc Routine(RoutineRequest) returns (RoutineResponse);
    rpc User(UserRequest) returns (UserResponse);
}

message RoutineRequest {
    string name = 1;
}

message RoutineResponse {
    Routine routine = 1;
}

message UserRequest {
    int32 user_id = 1;
}

message UserResponse {
    User user = 1;
}

message User {
    int32 user_id = 1;
    string display_name = 2;
    google.protobuf.Timestamp last_updated = 3;
}

message Workout {
    int32 user_id = 1;
    google.protobuf.Timestamp timestamp = 2;

    repeated Exercise exercises = 3;
}

message Routine {
    int32 routine_id = 1;
    string name = 2;
    int32 sequence = 3;

    repeated Exercise exercises = 4;
}

message Activity {
    int32 activity_id = 1;
    int32 exercise_id = 2;
    google.protobuf.Timestamp timestamp = 3;
    int32 reps = 4;
    Weight weight = 5;

    enum Rating {
        RATING_NONE = 0;
        RATING_EASY = 1;
        RATING_GOOD = 2;
        RATING_HARD = 3;
    }
    Rating rating = 6;
}

message Exercise {
    int32 exercise_id = 1;
    int32 sequence = 2;
    ExerciseClass class = 3;
    google.protobuf.Duration duration = 4;
    google.protobuf.Duration rest = 5;
    int32 reps = 6;
}

message ExerciseClass {
    int32 class_id = 1;
    string name = 2;
}

message Weight {

}
